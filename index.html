<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
    <script src="firebaseConfig.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div id="registration">
        <h2>Register</h2>
        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <button onclick="register()">Register</button>
    </div>
    
    <div id="login">
        <h2>Login</h2>
        <input type="text" id="loginUsername" placeholder="Username" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button onclick="login()">Login</button>
    </div>

    <div id="dmSection" style="display: none;">
        <h2>Direct Messages</h2>
        <input type="text" id="dmUsername" placeholder="DM Somebody" />
        <button onclick="loadDM()">Load DM</button>
        <div id="dmChat" style="border: 1px solid #ccc; padding: 10px; max-height: 300px; overflow-y: auto;"></div>
        <input type="text" id="dmMessage" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</body>
</html>
